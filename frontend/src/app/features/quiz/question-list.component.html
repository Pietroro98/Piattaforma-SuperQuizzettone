
 <!-- Form di ricerca -->
      <form class="d-flex mb-4">
        <input class="form-control me-2" type="search" placeholder="Search" aria-label="Search">
        <button class="btn btn-outline-success" type="submit">Search</button>
      </form>


<div class="container mt-4">
  <!-- Riga per centrare il contenuto -->
  <div class="row">    
    <!-- Definiamo la larghezza (es. 8 colonne su 12) -->
    <div class="col-md-8">

      <!-- UNICO contenitore accordion -->
      <div class="accordion" id="faqBackend">
        
        <!-- Accordion di prova (Opzionale, puoi toglierlo) -->
        <div class="accordion-item">
          <h2 class="accordion-header" id="headingOne">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne">
              Accordion di prova #1
            </button>
          </h2>
          <div id="collapseOne" class="accordion-collapse collapse" data-bs-parent="#faqBackend">
            <div class="accordion-body">
              Contenuto di prova...
            </div>
          </div>
        </div>

        <!-- Ciclo delle tue domande -->
        <app-accordion *ngFor="let q of questions; let i = index"
                       [title]="q.description"
                       [id]="'Question-' + q.id">

          <!-- Tutto questo va dentro l'ng-content dell'app-accordion -->
          <div class="mb-3">
            <span class="badge bg-info text-dark">{{ q.category.name }}</span>
            <span class="ms-2 badge bg-secondary">#{{ q.tag }}</span>
          </div>

          <div class="risposte-container text-start">
            <strong>Risposte:</strong>
            <ol class="list-group list-group-flush mt-2 list-group-numbered">
              <li *ngFor="let ans of q.answers" class="list-group-item">
                {{ ans.description }}
              </li>
            </ol>
          </div>

          <!-- Bottoni correttamente posizionati in fondo al contenuto -->
          <div class="d-flex justify-content-end gap-2 mt-3 mb-2">
            <button *ngIf="canAddQuestion" class="btn btn-outline-secondary btn-sm">
              Annulla
            </button>
            <button *ngIf="canAddQuestion" class="btn btn-primary btn-sm">
              Aggiungi
            </button>

            <button *ngIf="canAddDetails" class="btn btn-primary btn-sm" (click)="vaiInDettaglio()">
              Dettagli
            </button>

          </div>





        </app-accordion> 
      </div> <!-- Chiude accordion -->
      
    </div> <!-- Chiude col-md-8 -->
  </div> <!-- Chiude row -->
</div> <!-- Chiude container -->
